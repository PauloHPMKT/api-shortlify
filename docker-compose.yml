version: '3'

services:
  api-shortlify:
    build: .
    entrypoint: sh ./.docker/entrypoint.sh
    container_name: shortlify
    ports:
      - 3009:3009
    volumes:
      - .:/home/node/app
    tty: true
    depends_on:
      - db
    networks:
      - shortlify-network

  db:
    image: mongo:4.4
    container_name: mongo-db
    ports:
      - 27017:27017
    volumes:
      - /mongodb/dbdata:/data/db
      - /mongodb/configdb:/data/configdb
    environment:
      #      MONGO_INITDB_ROOT_USERNAME: root
      #      MONGO_INITDB_ROOT_PASSWORD: root
      MONGO_INITDB_DATABASE: shortlify
    networks:
      - shortlify-network

networks:
  shortlify-network:
    driver: bridge